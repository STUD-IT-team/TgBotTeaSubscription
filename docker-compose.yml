version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: tea_bot_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: danil
      POSTGRES_PASSWORD: password123
      POSTGRES_DB: tgbotteadb
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U danil -d tgbotteadb"]
      interval: 5s
      timeout: 5s
      retries: 5

  bot:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: tea_bot
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      - BOT_TOKEN=${BOT_TOKEN}
    volumes:
      - .:/app
    working_dir: /app

volumes:
  postgres_data:
